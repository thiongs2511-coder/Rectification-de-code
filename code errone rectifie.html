<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(135deg, #001f3f 0%, #003d7a 50%, #0056b3 100%);
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  padding: 40px 20px;
}

.main-title {
  text-align: center;
  color: #fff;
  font-size: 48px;
  font-weight: 700;
  margin-bottom: 20px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  letter-spacing: 2px;
}

.subtitle {
  text-align: center;
  color: #ffd700;
  font-size: 20px;
  font-weight: 400;
  margin-bottom: 50px;
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
  font-style: italic;
}

#cards-container {
  display: flex;
  justify-content: center;
  align-items: stretch;
  gap: 30px;
  flex-wrap: wrap;
  max-width: 1200px;
  margin: 0 auto;
}

.pricing {
  width: 320px;
  background: linear-gradient(145deg, #ffffff 0%, #f0f8ff 100%);
  box-shadow: 0 15px 35px rgba(0,0,0,0.3);
  padding: 30px;
  text-align: center;
  border-radius: 20px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  display: flex;
  flex-direction: column;
  border: 3px solid #ffd700;
}

.pricing:hover {
  transform: translateY(-10px);
  box-shadow: 0 20px 45px rgba(255,215,0,0.4);
}

.title {
  font-size: 28px;
  font-weight: 700;
  color: #001f3f;
  margin-bottom: 15px;
  text-transform: uppercase;
}

.price {
  font-size: 36px;
  font-weight: 700;
  background: linear-gradient(135deg, #00d4ff, #0056b3);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 25px;
}

.features {
  list-style: none;
  padding: 0;
  flex-grow: 1;
  text-align: left;
}

.features li {
  padding: 12px 10px;
  border-bottom: 2px solid #e0e0e0;
  color: #333;
  font-size: 15px;
  font-weight: 500;
}

.features li:before {
  content: "✓ ";
  color: #00d4ff;
  font-weight: bold;
  font-size: 18px;
  margin-right: 8px;
}

.btn {
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  color: #001f3f;
  padding: 15px 30px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-size: 16px;
  font-weight: 700;
  text-transform: uppercase;
  transition: all 0.3s ease;
  box-shadow: 0 5px 15px rgba(255,215,0,0.4);
  margin-top: auto;
}

.btn:hover {
  background: linear-gradient(135deg, #ffaa00, #ffd700);
  transform: scale(1.05);
  box-shadow: 0 8px 20px rgba(255,215,0,0.6);
}
</style>
</head>
<body>

<h1 class="main-title">Différents Forfait selon le Budget</h1>
<p class="subtitle">Mes dames et messieurs, nous avons différents forfaits selon votre budget, n'hésitez pas à choisir celui qui vous convient le mieux.</p>

<div id="cards-container"></div>

<script>
function Card(titre, prix, fonctionnalites) {
  return `
    <div class="pricing">
      <h2 class="title">${titre}</h2>
      <p class="price">${prix}</p>
      <ul class="features">
        ${fonctionnalites.map(f => `<li>${f}</li>`).join('')}
      </ul>
      <button class="btn">Démarrer l'essai</button>
    </div>
  `;
}

const container = document.getElementById('cards-container');

container.innerHTML = Card(
  'Forfait de base',
  '6500 Fcfa/mois',
  ['1 Go de stockage', 'Assistance de base', 'Toutes les fonctionnalités principales']
);

// Exemples d'utilisation avec plusieurs cartes
container.innerHTML += Card(
  'Forfait Pro',
  '12000 Fcfa/mois',
  ['10 Go de stockage', 'Assistance prioritaire', 'Fonctionnalités avancées', 'API access']
);

container.innerHTML += Card(
  'Forfait Entreprise',
  '25000 Fcfa/mois',
  ['Stockage illimité', 'Support 24/7', 'Toutes les fonctionnalités', 'Gestionnaire dédié']
);
</script>

</body>
</html>
